name: NexDroid ROM Compiler

on:
  repository_dispatch:
    types: [build_rom]

jobs:
  build:
    name: 🏗️ Build ROM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: ⬇️ Checkout Source
        uses: actions/checkout@v4

      # 1. CRITICAL: Frees up ~30GB of space so the build doesn't crash
      - name: 🧹 Optimize Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip zip unzip aria2 jq erofs-utils
          chmod +x bin/*

      - name: 🚀 Execute Modder Engine
        id: build
        env:
          # Pass secrets securely to the script
          PIXELDRAIN_KEY: ${{ secrets.PIXELDRAIN_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTER_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          NEXDROID_VERSION: ${{ github.event.client_payload.nexdroid_version || '1.05' }}
        run: |
          # The script handles the build, upload, AND success notification
          # We pipe output to both console (tee) and file for logging
          bash mod.sh "${{ github.event.client_payload.rom_url }}" "${{ github.event.client_payload.mods_selected }}" "${{ github.event.client_payload.build_mode }}" 2>&1 | tee build.log

      # --- ERROR HANDLING ---
      # Only runs if the previous step failed
      - name: 🚨 Notify Failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Capture the last 20 lines of the log for the error message
          ERROR_LOG=$(tail -n 20 build.log)
          
          # Send Professional Error Alert
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage \
          -d chat_id=${CHAT_ID} \
          -d parse_mode=Markdown \
          -d text="❌ *NexDroid Build Failed*
          
          ⚠️ _The build process encountered a critical error._
          
          📋 *Log Snippet:*
          \`\`\`
          $ERROR_LOG
          \`\`\`
          
          🔍 Check GitHub Actions for full details."

